name: OpenRV Windows

on:
  workflow_call:
    inputs:
      skip_deps_cache:
        type: string
        default: 'false'
      qt5_modules:
        type: string
      full_matrix:
        type: string
        default: 'true'

env:
  WINDOWS_QT5_ARCHIVES: 'd3dcompiler_47 opengl32sw qt3d qtactiveqt qtbase qtconnectivity qtdeclarative qtgraphicaleffects qtimageformats qtlocation qtmultimedia qtquickcontrols qtquickcontrols2 qtremoteobjects qtscxml qtsensors qtsvg qttools qttranslations qtwebchannel qtwebsockets qtwebview qtwinextras qtxmlpatterns'
  WINDOWS_QT6_MODULES: 'debug_info qt3d qt5compat qtactiveqt qtcharts qtconnectivity qtdatavis3d qtgrpc qthttpserver qtimageformats qtlanguageserver qtlocation qtlottie qtmultimedia qtnetworkauth qtpdf qtpositioning qtquick3d qtquick3dphysics qtquickeffectmaker qtquicktimeline qtremoteobjects qtscxml qtsensors qtserialbus qtserialport qtshadertools qtspeech qtvirtualkeyboard qtwebchannel qtwebengine qtwebsockets qtwebview'
  WINDOWS_QT6_ARCHIVES: 'd3dcompiler_47 opengl32sw qtbase qtdeclarative qtsvg qttools qttranslations'

jobs:
  # Always runs — CY2024 Release only (PR scope)
  windows-pr:
    name: 'Windows ${{ matrix.vfx-platform }}
      <${{ matrix.os }}
       msvc=${{ matrix.msvc-component }},
       qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       cmake=${{ matrix.cmake-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "windows-2022"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "6.5.3"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
            msvc-component: "14.40.17.10.x86.x64"
            msvc-compiler: "14.40.33807"

    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # 4.1.7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-windows
        with:
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          python-version: ${{ matrix.python-version }}
          cmake-version: ${{ matrix.cmake-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          msvc-component: ${{ matrix.msvc-component }}
          msvc-compiler: ${{ matrix.msvc-compiler }}
          qt5_modules: ${{ inputs.qt5_modules }}
          windows_qt5_archives: ${{ env.WINDOWS_QT5_ARCHIVES }}
          windows_qt6_modules: ${{ env.WINDOWS_QT6_MODULES }}
          windows_qt6_archives: ${{ env.WINDOWS_QT6_ARCHIVES }}

  # Full matrix only — CY2023 + Debug builds (daily/push/dispatch)
  windows-full:
    if: ${{ inputs.full_matrix == 'true' }}
    name: 'Windows ${{ matrix.vfx-platform }}
      <${{ matrix.os }}
       msvc=${{ matrix.msvc-component }},
       qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       cmake=${{ matrix.cmake-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    strategy:
      fail-fast: false
      matrix:
        include:
          # CY2023
          - os: "windows-2022"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "5.15.2"
            python-version: "3.10"
            cmake-version: "3.31.6"
            vfx-platform: "CY2023"
            msvc-component: "14.40.17.10.x86.x64"
            msvc-compiler: "14.40.33807"
          - os: "windows-2022"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "5.15.2"
            python-version: "3.10"
            cmake-version: "3.31.6"
            vfx-platform: "CY2023"
            msvc-component: "14.40.17.10.x86.x64"
            msvc-compiler: "14.40.33807"

          # CY2024 Debug
          - os: "windows-2022"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "6.5.3"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
            msvc-component: "14.40.17.10.x86.x64"
            msvc-compiler: "14.40.33807"

    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # 4.1.7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-windows
        with:
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          python-version: ${{ matrix.python-version }}
          cmake-version: ${{ matrix.cmake-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          msvc-component: ${{ matrix.msvc-component }}
          msvc-compiler: ${{ matrix.msvc-compiler }}
          qt5_modules: ${{ inputs.qt5_modules }}
          windows_qt5_archives: ${{ env.WINDOWS_QT5_ARCHIVES }}
          windows_qt6_modules: ${{ env.WINDOWS_QT6_MODULES }}
          windows_qt6_archives: ${{ env.WINDOWS_QT6_ARCHIVES }}
