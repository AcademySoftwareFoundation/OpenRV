name: OpenRV macOS

on:
  workflow_call:
    inputs:
      skip_deps_cache:
        type: string
        default: 'false'
      qt5_modules:
        type: string
      full_matrix:
        type: string
        default: 'true'

env:
  MACOX_X86_64_QT5_ARCHIVES: 'd3dcompiler_47 opengl32sw qt3d qtactiveqt qtbase qtconnectivity qtdeclarative qtgraphicaleffects qtimageformats qtlocation qtmultimedia qtquickcontrols qtquickcontrols2 qtremoteobjects qtscxml qtsensors qtsvg qttools qttranslations qtwebchannel qtwebsockets qtwebview qtwinextras qtxmlpatterns'
  MACOX_X86_64_QT6_MODULES: 'debug_info qt3d qt5compat qtcharts qtconnectivity qtdatavis3d qtgrpc qthttpserver qtimageformats qtlanguageserver qtlocation qtlottie qtmultimedia qtnetworkauth qtpdf qtpositioning qtquick3d qtquick3dphysics qtquickeffectmaker qtquicktimeline qtremoteobjects qtscxml qtsensors qtserialbus qtserialport qtshadertools qtspeech qtvirtualkeyboard qtwebchannel qtwebengine qtwebsockets qtwebview'
  MACOX_X86_64_QT6_ARCHIVES: 'qtbase qtdeclarative qtsvg qttools qttranslations'

jobs:
  # Always runs — CY2024 Release only (PR scope)
  macos-pr:
    name: '${{ matrix.os }} ${{ matrix.arch-type }} ${{ matrix.vfx-platform }}
      <qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "macos-15"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "6.5.3"
            qt-version-short: "6.5"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
          - os: "macos-14"
            arch-type: "arm64"
            build-type: "Release"
            qt-version: "6.5.3"
            qt-version-short: "6.5"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
    steps:
      - name: Check out repository code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # 4.1.7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-macos
        with:
          arch-type: ${{ matrix.arch-type }}
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          qt-version-short: ${{ matrix.qt-version-short }}
          python-version: ${{ matrix.python-version }}
          cmake-version: ${{ matrix.cmake-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          skip_deps_cache: ${{ inputs.skip_deps_cache }}
          qt5_modules: ${{ inputs.qt5_modules }}
          macos_qt5_archives: ${{ env.MACOX_X86_64_QT5_ARCHIVES }}
          macos_qt6_modules: ${{ env.MACOX_X86_64_QT6_MODULES }}
          macos_qt6_archives: ${{ env.MACOX_X86_64_QT6_ARCHIVES }}

  # Full matrix only — Debug builds (daily/push/dispatch)
  macos-full:
    if: ${{ inputs.full_matrix == 'true' }}
    name: '${{ matrix.os }} ${{ matrix.arch-type }} ${{ matrix.vfx-platform }}
      <qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "macos-15"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "6.5.3"
            qt-version-short: "6.5"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
          - os: "macos-14"
            arch-type: "arm64"
            build-type: "Debug"
            qt-version: "6.5.3"
            qt-version-short: "6.5"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
    steps:
      - name: Check out repository code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # 4.1.7
        with:
          submodules: recursive
      - uses: ./.github/actions/build-macos
        with:
          arch-type: ${{ matrix.arch-type }}
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          qt-version-short: ${{ matrix.qt-version-short }}
          python-version: ${{ matrix.python-version }}
          cmake-version: ${{ matrix.cmake-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          skip_deps_cache: ${{ inputs.skip_deps_cache }}
          qt5_modules: ${{ inputs.qt5_modules }}
          macos_qt5_archives: ${{ env.MACOX_X86_64_QT5_ARCHIVES }}
          macos_qt6_modules: ${{ env.MACOX_X86_64_QT6_MODULES }}
          macos_qt6_archives: ${{ env.MACOX_X86_64_QT6_ARCHIVES }}
