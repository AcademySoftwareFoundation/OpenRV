name: Visto Linux

on:
  workflow_call:
    inputs:
      skip_deps_cache:
        type: string
        default: 'false'
      qt5_modules:
        type: string
      full_matrix:
        type: string
        default: 'true'
      run_debug:
        type: string
        default: 'true'

jobs:
  # Always runs — CY2024 Release only (PR scope)
  rocky-linux-pr:
    name: 'Rocky Linux ${{ matrix.rocky-version }} ${{ matrix.vfx-platform }}
      <qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       cmake=${{ matrix.cmake-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.image }}
      volumes:
        - /usr/local/lib/android:/github/home/android
        - /usr/share/dotnet:/github/home/dotnet
        - /opt/ghc:/github/home/ghc
        - /usr/local/.ghcup:/github/home/.ghcup
        - /usr/local/graalvm:/github/home/graalvm
        - /usr/local/share/powershell:/github/home/powershell
        - /usr/local/share/chromium:/github/home/chromium
        - /usr/local/lib/node_modules:/github/home/node_modules
        - /opt/hostedtoolcache/CodeQL:/github/home/CodeQL
        - /usr/local/share/boost:/github/home/boost
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            rocky-version: "8"
            image: "amd64/rockylinux:8"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "6.5.3"
            cmake-version: "3.31.6"
            python-version: "3.11.8"
            vfx-platform: "CY2024"
            extra_repo: "powertools"
          - os: "ubuntu-latest"
            rocky-version: "9"
            image: "amd64/rockylinux:9"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "6.5.3"
            cmake-version: "3.31.6"
            python-version: "3.11.8"
            vfx-platform: "CY2024"
            extra_repo: "crb"
    steps:
      - name: Install git
        run: dnf install -y git
        shell: bash
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-linux
        with:
          rocky-version: ${{ matrix.rocky-version }}
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          cmake-version: ${{ matrix.cmake-version }}
          python-version: ${{ matrix.python-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          extra_repo: ${{ matrix.extra_repo }}
          qt5_modules: ${{ inputs.qt5_modules }}

  # CY2024 Debug — runs when cmake files change or on full matrix
  rocky-linux-debug:
    if: ${{ inputs.run_debug == 'true' }}
    name: 'Rocky Linux ${{ matrix.rocky-version }} ${{ matrix.vfx-platform }}
      <qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       cmake=${{ matrix.cmake-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.image }}
      volumes:
        - /usr/local/lib/android:/github/home/android
        - /usr/share/dotnet:/github/home/dotnet
        - /opt/ghc:/github/home/ghc
        - /usr/local/.ghcup:/github/home/.ghcup
        - /usr/local/graalvm:/github/home/graalvm
        - /usr/local/share/powershell:/github/home/powershell
        - /usr/local/share/chromium:/github/home/chromium
        - /usr/local/lib/node_modules:/github/home/node_modules
        - /opt/hostedtoolcache/CodeQL:/github/home/CodeQL
        - /usr/local/share/boost:/github/home/boost
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            rocky-version: "8"
            image: "amd64/rockylinux:8"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "6.5.3"
            cmake-version: "3.31.6"
            python-version: "3.11.8"
            vfx-platform: "CY2024"
            extra_repo: "powertools"
          - os: "ubuntu-latest"
            rocky-version: "9"
            image: "amd64/rockylinux:9"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "6.5.3"
            cmake-version: "3.31.6"
            python-version: "3.11.8"
            vfx-platform: "CY2024"
            extra_repo: "crb"
    steps:
      - name: Install git
        run: dnf install -y git
        shell: bash
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-linux
        with:
          rocky-version: ${{ matrix.rocky-version }}
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          cmake-version: ${{ matrix.cmake-version }}
          python-version: ${{ matrix.python-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          extra_repo: ${{ matrix.extra_repo }}
          qt5_modules: ${{ inputs.qt5_modules }}

  # CY2023 — full matrix only (daily/push/dispatch)
  rocky-linux-cy2023:
    if: ${{ inputs.full_matrix == 'true' }}
    name: 'Rocky Linux ${{ matrix.rocky-version }} ${{ matrix.vfx-platform }}
      <qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       cmake=${{ matrix.cmake-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.image }}
      volumes:
        - /usr/local/lib/android:/github/home/android
        - /usr/share/dotnet:/github/home/dotnet
        - /opt/ghc:/github/home/ghc
        - /usr/local/.ghcup:/github/home/.ghcup
        - /usr/local/graalvm:/github/home/graalvm
        - /usr/local/share/powershell:/github/home/powershell
        - /usr/local/share/chromium:/github/home/chromium
        - /usr/local/lib/node_modules:/github/home/node_modules
        - /opt/hostedtoolcache/CodeQL:/github/home/CodeQL
        - /usr/local/share/boost:/github/home/boost
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "ubuntu-latest"
            rocky-version: "8"
            image: "amd64/rockylinux:8"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "5.15.2"
            cmake-version: "3.31.6"
            python-version: "3.10"
            vfx-platform: "CY2023"
            extra_repo: "powertools"
          - os: "ubuntu-latest"
            rocky-version: "9"
            image: "amd64/rockylinux:9"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "5.15.2"
            cmake-version: "3.31.6"
            python-version: "3.10"
            vfx-platform: "CY2023"
            extra_repo: "crb"
          - os: "ubuntu-latest"
            rocky-version: "8"
            image: "amd64/rockylinux:8"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "5.15.2"
            cmake-version: "3.31.6"
            python-version: "3.10"
            vfx-platform: "CY2023"
            extra_repo: "powertools"
          - os: "ubuntu-latest"
            rocky-version: "9"
            image: "amd64/rockylinux:9"
            arch-type: "x86_64"
            build-type: "Debug"
            qt-version: "5.15.2"
            cmake-version: "3.31.6"
            python-version: "3.10"
            vfx-platform: "CY2023"
            extra_repo: "crb"
    steps:
      - name: Install git
        run: dnf install -y git
        shell: bash
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-linux
        with:
          rocky-version: ${{ matrix.rocky-version }}
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          cmake-version: ${{ matrix.cmake-version }}
          python-version: ${{ matrix.python-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          extra_repo: ${{ matrix.extra_repo }}
          qt5_modules: ${{ inputs.qt5_modules }}
